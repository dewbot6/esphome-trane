esphome:
  name: esphome-trane
  friendly_name: ESPHome Trane

  devices:
    - id: dev_thermostat
      name: "Trane Thermostat UX360"
    - id: dev_sc360
      name: "Trane SC360 Controller"
    - id: dev_air_handler
      name: "Trane Air Handler"
    - id: dev_heat_pump
      name: "Trane Heat Pump"

external_components:
  - source:
      type: local
      path: components
    components: [trane_hvac]

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

logger:
  level: DEBUG
  logs:
    sensor: WARN
    canbus: WARN
    can649: DEBUG
    can641: DEBUG

api:
  services:
    - service: set_temperature
      variables:
        target_temp_low: float
        target_temp_high: float
      then:
        - script.execute:
            id: can_transmit_json
            payload: !lambda |-
              char buf[128];
              snprintf(buf, sizeof(buf),
                "{\"SpOverride\":{\"Put\":{\"1\":{\"Hsp\":\"%.0f\",\"Csp\":\"%.0f\",\"HoldType\":\"2\",\"Source\":\"1\"}}}}",
                target_temp_low, target_temp_high);
              return std::string(buf);

    - service: set_mode
      variables:
        mode: string
      then:
        - script.execute:
            id: can_transmit_json
            payload: !lambda |-
              std::string m = "C";
              if (mode == "heat") m = "A";
              else if (mode == "cool") m = "B";
              char buf[64];
              snprintf(buf, sizeof(buf),
                "{\"SystemMode\":{\"Put\":{\"B\":\"%s\"}}}",
                m.c_str());
              return std::string(buf);

ota:
  - platform: esphome

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
      hidden: true

globals:
  - id: buf_649
    type: std::string
    restore_value: no
    initial_value: ""
  - id: buf_641
    type: std::string
    restore_value: no
    initial_value: ""
  - id: hsp_zone1
    type: float
    restore_value: yes
    initial_value: "70.0"
  - id: csp_zone1
    type: float
    restore_value: yes
    initial_value: "75.0"

# ---------------------------------------------------------------------------
# Transmit script — sends a JSON string as segmented CAN frames on 0x641
# ---------------------------------------------------------------------------
script:
  - id: can_transmit_json
    parameters:
      payload: string
    then:
      - lambda: |-
          int total = payload.size();
          // Header frame: 0xC2, length LE uint32, padding
          std::vector<uint8_t> f0 = {
            0xC2,
            (uint8_t)(total & 0xFF),
            (uint8_t)((total >> 8) & 0xFF),
            0x00, 0x00, 0x00, 0x00, 0x00
          };
          id(hvac_can).send_data(0x641, false, f0);
          delay(2);
          // Continuation and last frames
          int offset = 0;
          uint8_t seq = 1;
          while (offset < total) {
            int remaining = total - offset;
            std::vector<uint8_t> frame(8, 0);
            if (remaining <= 7) {
              frame[0] = 0x80 | (uint8_t)(remaining + 1);
              for (int i = 0; i < remaining; i++)
                frame[i + 1] = payload[offset + i];
              id(hvac_can).send_data(0x641, false, frame);
              break;
            } else {
              frame[0] = seq++;
              for (int i = 0; i < 7; i++)
                frame[i + 1] = payload[offset + i];
              id(hvac_can).send_data(0x641, false, frame);
              offset += 7;
              delay(2);
            }
          }
          ESP_LOGI("trane_tx", "Sent: %s", payload.c_str());

