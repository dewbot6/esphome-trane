# ---------------------------------------------------------------------------
# Climate entity
# ---------------------------------------------------------------------------
climate:
  - platform: trane_hvac
    id: trane_climate
    name: "Trane Climate"
    device_id: dev_thermostat
    current_temperature_sensor: room_temp
    heat_setpoint_sensor: heat_setpoint
    cool_setpoint_sensor: cool_setpoint
    mode_text_sensor: system_mode
    demand_stage_sensor: system_demand
    indoor_unit_state_sensor: indoor_unit_state

    set_mode_action:
      - script.execute:
          id: can_transmit_json
          payload: !lambda |-
            std::string m;
            if (mode == climate::CLIMATE_MODE_HEAT)      m = "A";
            else if (mode == climate::CLIMATE_MODE_COOL) m = "B";
            else                                          m = "C";
            char buf[64];
            snprintf(buf, sizeof(buf),
              "{\"SystemMode\":{\"Put\":{\"B\":\"%s\"}}}",
              m.c_str());
            return std::string(buf);

    set_temperature_action:
      - script.execute:
          id: can_transmit_json
          payload: !lambda |-
            char buf[160];
            snprintf(buf, sizeof(buf),
              "{\"SpOverride\":{\"Put\":{\"1\":{\"Hsp\":\"%.0f\",\"Csp\":\"%.0f\","
              "\"HoldType\":\"2\",\"Source\":\"1\"}}}}",
              hsp_f, csp_f);
            return std::string(buf);

    set_preset_action:
      - script.execute:
          id: can_transmit_json
          payload: !lambda |-
            float hsp, csp;
            if (preset == climate::CLIMATE_PRESET_HOME) {
              hsp = 70; csp = 75;
            } else if (preset == climate::CLIMATE_PRESET_AWAY) {
              hsp = 62; csp = 85;
            } else if (preset == climate::CLIMATE_PRESET_SLEEP) {
              hsp = 67; csp = 72;
            } else if (preset == climate::CLIMATE_PRESET_BOOST) {
              hsp = 74; csp = 72;
            } else {
              hsp = id(hsp_zone1); csp = id(csp_zone1);
            }
            char buf[160];
            snprintf(buf, sizeof(buf),
              "{\"SpOverride\":{\"Put\":{\"1\":{\"Hsp\":\"%.0f\",\"Csp\":\"%.0f\","
              "\"HoldType\":\"2\",\"Source\":\"1\"}}}}",
              hsp, csp);
            return std::string(buf);

# ---------------------------------------------------------------------------
# CAN bus
# ---------------------------------------------------------------------------
canbus:
  - platform: esp32_can
    id: hvac_can
    tx_pin: GPIO5
    rx_pin: GPIO6
    bit_rate: 50kbps
    can_id: 1

    on_frame:

      # -----------------------------------------------------------------------
      # 0x649 — system broadcast JSON
      # -----------------------------------------------------------------------
      - can_id: 0x649
        can_id_mask: 0x7FF
        then:
          - lambda: |-
              uint8_t seq = x[0];
              if ((seq & 0xF0) == 0xC0) {
                id(buf_649) = "";
                for (int i = 5; i < (int)x.size(); i++)
                  if (x[i]) id(buf_649) += (char)x[i];
              } else if (seq & 0x80) {
                int used = (seq & 0x7F) - 1;
                for (int i = 1; i <= used && i < (int)x.size(); i++) {
                  if (x[i] == 0) break;
                  id(buf_649) += (char)x[i];
                }
                std::string j = id(buf_649);
                id(last_json_649).publish_state(j);
                ESP_LOGD("can649", "JSON: %s", j.c_str());
                // Hsp
                auto p = j.find("\"Hsp\":\"");
                if (p != std::string::npos) {
                  p += 7;
                  auto e = j.find("\"", p);
                  if (e != std::string::npos)
                    id(hsp_zone1) = atof(j.substr(p, e-p).c_str());
                }
                // Csp
                auto cp = j.find("\"Csp\":\"");
                if (cp != std::string::npos) {
                  cp += 7;
                  auto e = j.find("\"", cp);
                  if (e != std::string::npos)
                    id(csp_zone1) = atof(j.substr(cp, e-cp).c_str());
                }
                // Sync climate setpoints whenever either changes
                if (j.find("\"Hsp\":\"") != std::string::npos ||
                    j.find("\"Csp\":\"") != std::string::npos) {
                  auto *cl = id(trane_climate);
                  cl->target_temperature_low  = id(hsp_zone1);
                  cl->target_temperature_high = id(csp_zone1);
                  cl->publish_state();
                }                // SystemOpStatus
                auto sos = j.find("\"SystemOpStatus\"");
                if (sos != std::string::npos) {
                  auto b_pos = j.find("\"B\":\"", sos);
                  if (b_pos != std::string::npos) {
                    b_pos += 5;
                    auto e = j.find("\"", b_pos);
                    if (e != std::string::npos) {
                      std::string bval = j.substr(b_pos, e-b_pos);
                      std::string mode = bval == "A" ? "heat" :
                                         bval == "B" ? "cool" :
                                         bval == "C" ? "off" : bval;
                      id(system_mode).publish_state(mode);
                    }
                  }
                  auto c_pos = j.find("\"C\":\"", sos);
                  if (c_pos != std::string::npos) {
                    c_pos += 5;
                    auto e = j.find("\"", c_pos);
                    if (e != std::string::npos)
                      id(system_demand).publish_state(j.substr(c_pos, e-c_pos));
                  }
                  auto d_pos = j.find("\"D\":\"", sos);
                  if (d_pos != std::string::npos) {
                    d_pos += 5;
                    auto e = j.find("\"", d_pos);
                    if (e != std::string::npos) {
                      std::string dstr = j.substr(d_pos, e-d_pos);
                      id(sys_op_status_d).publish_state(dstr);
                      float dval = atof(dstr.c_str());
                      if (dval >= 0) id(system_demand_pct).publish_state(dval);
                    }
                  }
                  auto e_pos = j.find("\"E\":\"", sos);
                  if (e_pos != std::string::npos) {
                    e_pos += 5;
                    auto e = j.find("\"", e_pos);
                    if (e != std::string::npos) {
                      std::string estr = j.substr(e_pos, e-e_pos);
                      // Values with decimal point (e.g. "28.00") are SC360 outdoor temp
                      // Integer values (e.g. "42") are indoor humidity %
                      if (estr.find('.') != std::string::npos) {
                        float t = atof(estr.c_str());
                        if (t > 0 && t < 130) id(sc360_outdoor_temp).publish_state(t);
                      } else {
                        float h = atof(estr.c_str());
                        if (h > 0 && h <= 100) id(indoor_humidity).publish_state(h);
                      }
                    }
                  }
                }
                // ZoneStatus
                auto ht = j.find("\"HoldText\":\"");
                if (ht != std::string::npos) {
                  ht += 12;
                  auto e = j.find("\"", ht);
                  if (e != std::string::npos)
                    id(hold_text).publish_state(j.substr(ht, e-ht));
                }
                auto h_pos = j.find("\"H\":\"");
                if (h_pos != std::string::npos) {
                  h_pos += 5;
                  auto e = j.find("\"", h_pos);
                  if (e != std::string::npos) {
                    float t = atof(j.substr(h_pos, e-h_pos).c_str());
                    if (t > 32 && t < 110) id(room_temp).publish_state(t);
                  }
                }
                auto hcs = j.find("\"HcStatus\":\"");
                if (hcs != std::string::npos) {
                  hcs += 12;
                  auto e = j.find("\"", hcs);
                  if (e != std::string::npos)
                    id(hc_status).publish_state(j.substr(hcs, e-hcs));
                }
                // OdStatus
                auto cdp = j.find("\"CompDemandPercent\":\"");
                if (cdp != std::string::npos) {
                  cdp += 21;
                  auto e = j.find("\"", cdp);
                  if (e != std::string::npos)
                    id(compressor_demand).publish_state(atof(j.substr(cdp, e-cdp).c_str()));
                }
                auto od = j.find("\"OdStatus\"");
                if (od != std::string::npos) {
                  auto b2 = j.find("\"B\":\"", od);
                  if (b2 != std::string::npos) {
                    b2 += 5;
                    auto e = j.find("\"", b2);
                    if (e != std::string::npos) {
                      float hz = atof(j.substr(b2, e-b2).c_str());
                      if (hz > 0) id(compressor_freq).publish_state(hz);
                    }
                  }
                }
                // WeatherToday
                auto wt = j.find("\"WeatherToday\"");
                if (wt != std::string::npos) {
                  // D = current outdoor temp (°F)
                  auto wd = j.find("\"D\":\"", wt);
                  if (wd != std::string::npos) {
                    wd += 5;
                    auto e = j.find("\"", wd);
                    if (e != std::string::npos)
                      id(weather_current_temp).publish_state(j.substr(wd, e-wd));
                  }
                  // E = outdoor humidity (%)
                  auto we = j.find("\"E\":\"", wt);
                  if (we != std::string::npos) {
                    we += 5;
                    auto e = j.find("\"", we);
                    if (e != std::string::npos) {
                      float h = atof(j.substr(we, e-we).c_str());
                      if (h > 0 && h <= 100) id(weather_humidity).publish_state(h);
                    }
                  }
                  // F = feels-like temp (°F)
                  auto wf = j.find("\"F\":\"", wt);
                  if (wf != std::string::npos) {
                    wf += 5;
                    auto e = j.find("\"", wf);
                    if (e != std::string::npos)
                      id(weather_feels_like).publish_state(j.substr(wf, e-wf));
                  }
                  // G = forecast high (°F) - already in README, no sensor needed yet
                  // H = condition code
                  auto wh = j.find("\"H\":\"", wt);
                  if (wh != std::string::npos) {
                    wh += 5;
                    auto e = j.find("\"", wh);
                    if (e != std::string::npos)
                      id(weather_condition_code).publish_state(j.substr(wh, e-wh));
                  }
                  // I = forecast low (°F) - already in README, no sensor needed yet
                }
                // IndoorStatus
                auto ind = j.find("\"IndoorStatus\"");
                if (ind != std::string::npos) {
                  auto ie = j.find("\"E\":\"", ind);
                  if (ie != std::string::npos) {
                    ie += 5;
                    auto e = j.find("\"", ie);
                    if (e != std::string::npos) {
                      std::string estr = j.substr(ie, e-ie);
                      float v = atof(estr.c_str());
                      if (v > 0 && v <= 100) {
                        // Numeric: publish as blower speed
                        id(indoor_blower).publish_state(v);
                      } else if (estr.size() > 0 && !isdigit(estr[0])) {
                        // Non-numeric: publish as fault string
                        id(supply_air_fault).publish_state(estr);
                      }
                    }
                  }
                  auto id_pos = j.find("\"D\":\"", ind);
                  if (id_pos != std::string::npos) {
                    id_pos += 5;
                    auto e = j.find("\"", id_pos);
                    if (e != std::string::npos)
                      id(indoor_unit_state).publish_state(j.substr(id_pos, e-id_pos));
                  }
                }
                // ZoneSettings
                auto zs = j.find("\"ZoneSettings\"");
                if (zs != std::string::npos) {
                  auto zm = j.find("\"ZoneMode\":\"", zs);
                  if (zm != std::string::npos) {
                    zm += 12;
                    auto e = j.find("\"", zm);
                    if (e != std::string::npos)
                      id(zone_mode).publish_state(j.substr(zm, e-zm));
                  }
                }
                id(buf_649) = "";
              } else {
                for (int i = 1; i < (int)x.size(); i++)
                  if (x[i]) id(buf_649) += (char)x[i];
              }

      # -----------------------------------------------------------------------
      # 0x641 — command/response JSON
      # -----------------------------------------------------------------------
      - can_id: 0x641
        can_id_mask: 0x7FF
        then:
          - lambda: |-
              uint8_t seq = x[0];
              if ((seq & 0xF0) == 0xC0) {
                id(buf_641) = "";
                for (int i = 5; i < (int)x.size(); i++)
                  if (x[i]) id(buf_641) += (char)x[i];
              } else if (seq & 0x80) {
                int used = (seq & 0x7F) - 1;
                for (int i = 1; i <= used && i < (int)x.size(); i++) {
                  if (x[i] == 0) break;
                  id(buf_641) += (char)x[i];
                }
                std::string j = id(buf_641);
                id(last_json_641).publish_state(j);
                ESP_LOGD("can641", "JSON: %s", j.c_str());
                auto p = j.find("\"Hsp\":\"");
                if (p != std::string::npos) {
                  p += 7;
                  auto e = j.find("\"", p);
                  if (e != std::string::npos)
                    id(hsp_zone1) = atof(j.substr(p, e-p).c_str());
                }
                auto c = j.find("\"Csp\":\"");
                if (c != std::string::npos) {
                  c += 7;
                  auto e = j.find("\"", c);
                  if (e != std::string::npos)
                    id(csp_zone1) = atof(j.substr(c, e-c).c_str());
                }
                id(buf_641) = "";
              } else {
                for (int i = 1; i < (int)x.size(); i++)
                  if (x[i]) id(buf_641) += (char)x[i];
              }

